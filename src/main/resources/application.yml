spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_CONTAINER_NAME:localhost}:5432/${POSTGRES_DB:employee_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:admin}
    driver-class-name: ${POSTGRES_DRIVER_CLASS:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_POOL_SIZE:5}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:true}
    database: ${POSTGRES_DB_NAME:postgresql}
    show-sql: ${SHOW_SQL:true}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATION:classpath:db/migration}
    validate-on-migrate: ${FLYWAY_VALIDATION:true}

logging:
  level:
    org.springframework: ${LOG_LEVEL:DEBUG}
    org.hibernate: ${LOG_LEVEL:TRACE}
