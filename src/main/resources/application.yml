spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/employee_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: employee_db
    show-sql: true
  flyway:
    enabled: true
    locations: ./db/migration
    validate-on-migrate: true

logging:
  level:
    org.springframework: INFO
